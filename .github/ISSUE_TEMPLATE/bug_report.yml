name: Bug report
description: Report a reproducible PlanDelta defect.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not attach private construction drawings, credentials, signed URLs, or OCR text.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps using the labelled sample or a non-sensitive fixture.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Local, Vercel, browser, operating system, and commit SHA
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Safe evidence
      description: Add redacted logs, screenshots, or correlation IDs only.
