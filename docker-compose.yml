name: plandelta

services:
  api:
    image: plandelta-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "apps/api/dist/main.js"]
    env_file: .env.local
    environment:
      LOCAL_STORAGE_ROOT: /data
      VISION_SERVICE_URL: http://vision:8000
    ports:
      - "4000:4000"
    volumes:
      - plandelta-data:/data
    depends_on:
      vision:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health/ready').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    image: plandelta-api:local
    pull_policy: never
    command: ["node", "apps/api/dist/worker.js"]
    env_file: .env.local
    environment:
      LOCAL_STORAGE_ROOT: /data
      VISION_SERVICE_URL: http://vision:8000
    volumes:
      - plandelta-data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  vision:
    image: plandelta-vision:local
    build:
      context: apps/vision
      dockerfile: Dockerfile
    env_file: .env.local
    environment:
      VISION_SHARED_ROOT: /data
    ports:
      - "8000:8000"
    volumes:
      - plandelta-data:/data
      - plandelta-vision-models:/home/plandelta/.paddlex
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  plandelta-data:
  plandelta-vision-models:
